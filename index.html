<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Netuke.Workshop</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
:root{--bg:#080b10;--surface:#0f1520;--surface2:#151c2c;--accent:#00e5ff;--accent2:#7b5cff;--accent3:#ff3d6e;--text:#e8edf5;--muted:#6b7897;--border:rgba(255,255,255,0.06)}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(0,229,255,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(0,229,255,.03) 1px,transparent 1px);background-size:48px 48px;pointer-events:none;z-index:0}
.orb{position:fixed;border-radius:50%;filter:blur(90px);opacity:.28;pointer-events:none;z-index:0}
.orb-1{width:480px;height:480px;background:var(--accent2);top:-120px;left:-80px;animation:drift 12s ease-in-out infinite alternate}
.orb-2{width:360px;height:360px;background:var(--accent);bottom:100px;right:-60px;animation:drift 15s ease-in-out infinite alternate-reverse}
.orb-3{width:260px;height:260px;background:var(--accent3);top:45%;left:50%;animation:drift 10s ease-in-out infinite alternate}
@keyframes drift{from{transform:translate(0,0)}to{transform:translate(40px,30px)}}
.wrapper{position:relative;z-index:1;max-width:1100px;margin:0 auto;padding:0 24px}

/* NAV */
nav{position:sticky;top:0;z-index:100;backdrop-filter:blur(20px);background:rgba(8,11,16,.92);border-bottom:1px solid var(--border)}
.nav-row1{max-width:1100px;margin:0 auto;padding:0 16px;display:flex;align-items:center;gap:10px;height:58px}
.logo{font-family:'Syne',sans-serif;font-size:1.35rem;font-weight:800;letter-spacing:-.5px;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;cursor:pointer;white-space:nowrap;flex-shrink:0;text-decoration:none}
.logo span{-webkit-text-fill-color:var(--accent3)}
.nav-search{display:flex;align-items:center;background:var(--surface);border:1px solid var(--border);border-radius:9px;overflow:hidden;flex:1;min-width:0;transition:border-color .2s}
.nav-search:focus-within{border-color:rgba(0,229,255,.35)}
.nav-search input{flex:1;min-width:0;background:transparent;border:none;outline:none;color:var(--text);font-family:'DM Sans',sans-serif;font-size:.85rem;padding:9px 12px}
.nav-search input::placeholder{color:var(--muted)}
.nav-search button{background:transparent;border:none;cursor:pointer;color:var(--muted);padding:9px 10px;display:flex;align-items:center;flex-shrink:0;transition:color .2s}
.nav-search button:hover{color:var(--accent)}

/* Translate button */
.btn-translate{display:inline-flex;align-items:center;gap:6px;background:rgba(255,255,255,.05);border:1px solid var(--border);color:var(--muted);font-family:'DM Sans',sans-serif;font-size:.8rem;font-weight:500;padding:7px 13px;border-radius:8px;cursor:pointer;transition:all .2s;white-space:nowrap;flex-shrink:0}
.btn-translate:hover{color:var(--text);border-color:rgba(255,255,255,.18);background:rgba(255,255,255,.08)}
.btn-translate.active{color:var(--accent);border-color:rgba(0,229,255,.35);background:rgba(0,229,255,.07)}

/* Tab nav row */
.nav-row2{border-top:1px solid var(--border);overflow-x:auto;scrollbar-width:none;-webkit-overflow-scrolling:touch}
.nav-row2::-webkit-scrollbar{display:none}
.tab-nav{display:flex;gap:4px;padding:6px 16px;min-width:max-content}
.tab-btn{display:inline-flex;align-items:center;gap:6px;padding:7px 16px;border-radius:7px;font-family:'DM Sans',sans-serif;font-size:.85rem;font-weight:500;cursor:pointer;border:none;background:transparent;color:var(--muted);transition:all .2s;white-space:nowrap}
.tab-btn:hover{color:var(--text);background:rgba(255,255,255,.05)}
.tab-btn.active{background:linear-gradient(135deg,var(--accent2),var(--accent));color:#0a0d14;font-weight:700}

/* Music bar */
.music-bar{display:none;align-items:center;gap:10px;background:rgba(123,92,255,.1);border-bottom:1px solid rgba(123,92,255,.2);padding:5px 16px;font-size:.77rem;color:var(--muted);flex-wrap:wrap}
.music-bar.show{display:flex}
.music-bar span{color:var(--accent2);font-weight:600}
.music-btn{background:none;border:1px solid var(--border);color:var(--muted);padding:3px 10px;border-radius:99px;cursor:pointer;font-size:.74rem;transition:all .2s}
.music-btn:hover{color:var(--text);border-color:rgba(255,255,255,.2)}

/* PAGES */
.page{display:none}.page.active{display:block;animation:fadeUp .45s ease both}
@keyframes fadeUp{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}

/* HERO */
.hero{padding:88px 0 58px;text-align:center}
.hero-tag{display:inline-flex;align-items:center;gap:8px;font-size:.77rem;font-weight:500;letter-spacing:1.5px;text-transform:uppercase;color:var(--accent);border:1px solid rgba(0,229,255,.2);background:rgba(0,229,255,.05);padding:6px 16px;border-radius:99px;margin-bottom:26px}
.hero-tag::before{content:'⬡';font-size:.95rem}
.hero h1{font-family:'Syne',sans-serif;font-size:clamp(2.4rem,6vw,4.8rem);font-weight:800;line-height:1.06;letter-spacing:-2px;margin-bottom:20px}
.hero h1 em{font-style:normal;background:linear-gradient(135deg,var(--accent) 0%,var(--accent2) 60%,var(--accent3) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.hero p{font-size:1.05rem;color:var(--muted);max-width:540px;margin:0 auto 36px;line-height:1.8}
.hero-actions{display:flex;gap:14px;justify-content:center;flex-wrap:wrap}
.btn{display:inline-flex;align-items:center;gap:9px;padding:12px 24px;border-radius:10px;font-family:'DM Sans',sans-serif;font-size:.9rem;font-weight:500;cursor:pointer;text-decoration:none;transition:all .25s;border:none}
.btn-primary{background:linear-gradient(135deg,var(--accent2),var(--accent));color:#0a0d14;font-weight:700;box-shadow:0 0 28px rgba(0,229,255,.18)}
.btn-primary:hover{transform:translateY(-3px);box-shadow:0 0 46px rgba(0,229,255,.38)}
.btn-ghost{background:transparent;color:var(--text);border:1px solid var(--border)}
.btn-ghost:hover{background:var(--surface2);transform:translateY(-2px)}

/* CREATOR */
.creator-band{background:linear-gradient(135deg,rgba(123,92,255,.1),rgba(0,229,255,.06));border:1px solid rgba(123,92,255,.22);border-radius:18px;padding:24px 28px;display:flex;flex-direction:column;gap:14px;margin-bottom:52px}
.creator-top{display:flex;align-items:center;gap:14px}
.creator-avatar{width:50px;height:50px;border-radius:50%;background:linear-gradient(135deg,var(--accent2),var(--accent));display:flex;align-items:center;justify-content:center;font-size:1.4rem;flex-shrink:0}
.creator-info{flex:1;min-width:0}
.creator-info h3{font-family:'Syne',sans-serif;font-size:1rem;font-weight:700;margin-bottom:6px}
.creator-desc{font-size:.85rem;color:var(--muted);line-height:1.65}
.creator-badges{display:flex;flex-wrap:wrap;gap:6px;margin-top:4px}
.cbadge{font-size:.7rem;padding:4px 10px;border-radius:99px;font-weight:600;border:1px solid;display:inline-flex;align-items:center;gap:5px}
.cbadge-yt{color:#ff6060;border-color:rgba(255,96,96,.3);background:rgba(255,96,96,.08)}
.cbadge-dc{color:#a5aeff;border-color:rgba(165,174,255,.3);background:rgba(165,174,255,.08)}
.cbadge-cr{color:var(--accent);border-color:rgba(0,229,255,.22);background:rgba(0,229,255,.06)}

/* STATS */
.stats{display:flex;gap:2px;flex-wrap:wrap;justify-content:center;margin-bottom:60px}
.stat-card{flex:1;min-width:120px;background:var(--surface);border:1px solid var(--border);padding:22px 16px;text-align:center;border-radius:4px;transition:background .2s}
.stat-card:first-child{border-radius:14px 4px 4px 14px}
.stat-card:last-child{border-radius:4px 14px 14px 4px}
.stat-card:hover{background:var(--surface2)}
.stat-num{font-family:'Syne',sans-serif;font-size:1.7rem;font-weight:800;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.stat-label{font-size:.74rem;color:var(--muted);margin-top:4px;letter-spacing:.5px;text-transform:uppercase}

/* FEATURES */
.section-title{font-family:'Syne',sans-serif;font-size:1.75rem;font-weight:800;letter-spacing:-1px;margin-bottom:8px}
.section-sub{color:var(--muted);margin-bottom:30px}
.features-section{padding:48px 0}
.features-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(210px,1fr));gap:13px}
.feat-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:22px;transition:all .25s;position:relative;overflow:hidden}
.feat-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--accent2),var(--accent));opacity:0;transition:opacity .25s}
.feat-card:hover{transform:translateY(-4px);background:var(--surface2);border-color:rgba(0,229,255,.14)}
.feat-card:hover::before{opacity:1}
.feat-icon{font-size:1.8rem;margin-bottom:12px;display:inline-block}
.feat-card h3{font-family:'Syne',sans-serif;font-size:.96rem;font-weight:700;margin-bottom:7px}
.feat-card p{font-size:.84rem;color:var(--muted);line-height:1.65}

/* SOCIAL */
.social-section{padding:52px 0 76px}
.discord-banner{background:linear-gradient(135deg,#1a1040,#0d1a30,#0a1228);border:1px solid rgba(123,92,255,.28);border-radius:22px;padding:40px 38px;display:flex;align-items:center;gap:30px;flex-wrap:wrap;position:relative;overflow:hidden;margin-bottom:20px}
.discord-banner::before{content:'';position:absolute;top:-80px;right:-80px;width:300px;height:300px;background:radial-gradient(circle,rgba(123,92,255,.2),transparent 70%);pointer-events:none}
.discord-content{flex:1;min-width:200px}
.discord-content h2{font-family:'Syne',sans-serif;font-size:1.55rem;font-weight:800;letter-spacing:-1px;margin-bottom:10px}
.discord-content p{color:var(--muted);line-height:1.75;margin-bottom:16px}
.discord-perks{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:22px}
.perk{display:inline-flex;align-items:center;gap:6px;font-size:.78rem;color:var(--text);background:rgba(255,255,255,.05);border:1px solid var(--border);padding:5px 11px;border-radius:99px}
.btn-discord{display:inline-flex;align-items:center;gap:9px;background:#5865f2;color:#fff;font-size:.88rem;font-weight:600;padding:11px 22px;border-radius:11px;text-decoration:none;transition:all .25s}
.btn-discord:hover{background:#4752c4;transform:translateY(-3px);box-shadow:0 10px 36px rgba(88,101,242,.4)}
.yt-banner{background:var(--surface);border:1px solid var(--border);border-radius:18px;padding:26px 30px;display:flex;align-items:center;gap:22px;flex-wrap:wrap}
.yt-content{flex:1;min-width:180px}
.yt-content h3{font-family:'Syne',sans-serif;font-size:1.05rem;font-weight:700;margin-bottom:5px}
.yt-content p{color:var(--muted);font-size:.84rem;line-height:1.65}
.btn-yt{display:inline-flex;align-items:center;gap:8px;background:#ff0000;color:#fff;font-size:.85rem;font-weight:600;padding:10px 18px;border-radius:10px;text-decoration:none;transition:all .25s;flex-shrink:0}
.btn-yt:hover{background:#cc0000;transform:translateY(-2px);box-shadow:0 8px 28px rgba(255,0,0,.32)}
.divider{border:none;border-top:1px solid var(--border);margin:14px 0}

/* DOWNLOADS */
.dl-page-hero{padding:60px 0 40px;text-align:center}
.dl-page-hero h1{font-family:'Syne',sans-serif;font-size:clamp(1.9rem,5vw,3.2rem);font-weight:800;letter-spacing:-1.5px;margin-bottom:10px}
.dl-page-hero h1 em{font-style:normal;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.dl-page-hero p{color:var(--muted);font-size:.98rem;max-width:460px;margin:0 auto;line-height:1.75}
.search-info{display:none;text-align:center;margin-bottom:28px;color:var(--muted);font-size:.88rem}
.search-info strong{color:var(--accent)}
.clear-btn{background:none;border:1px solid var(--border);color:var(--muted);padding:3px 11px;border-radius:99px;cursor:pointer;font-size:.78rem;margin-left:9px;transition:all .2s}
.clear-btn:hover{color:var(--text)}

/* GAME SECTION */
.game-section{margin-bottom:54px}
.game-header{display:flex;align-items:center;gap:14px;margin-bottom:16px;padding-bottom:14px;border-bottom:1px solid var(--border)}
.game-icon{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:1.45rem;flex-shrink:0;overflow:hidden}
.game-icon img{width:100%;height:100%;object-fit:cover}
.game-header-info{flex:1;min-width:0}
.game-header-info h2{font-family:'Syne',sans-serif;font-size:1.25rem;font-weight:800;letter-spacing:-.5px;margin-bottom:2px}
.game-header-info p{font-size:.81rem;color:var(--muted)}
.game-count{font-size:.72rem;color:var(--muted);background:var(--surface2);border:1px solid var(--border);padding:3px 11px;border-radius:99px;white-space:nowrap;flex-shrink:0}

/* SUB TABS */
.sub-tabs{display:flex;gap:6px;flex-wrap:nowrap;overflow-x:auto;margin-bottom:16px;padding-bottom:2px;scrollbar-width:none;-webkit-overflow-scrolling:touch}
.sub-tabs::-webkit-scrollbar{display:none}
.sub-tab{padding:6px 15px;border-radius:99px;border:1px solid var(--border);background:transparent;color:var(--muted);font-family:'DM Sans',sans-serif;font-size:.81rem;font-weight:500;cursor:pointer;transition:all .2s;white-space:nowrap;flex-shrink:0}
.sub-tab:hover{color:var(--text);border-color:rgba(255,255,255,.15)}
.sub-tab.active{background:linear-gradient(135deg,var(--accent2),var(--accent));color:#0a0d14;border-color:transparent;font-weight:700}

/* CARDS */
.downloads-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px}
.dl-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;overflow:hidden;transition:all .3s}
.dl-card:hover{transform:translateY(-5px);box-shadow:0 16px 48px rgba(0,0,0,.5);border-color:rgba(123,92,255,.28)}
.dl-card.hidden{display:none}
.dl-thumb{height:114px;display:flex;align-items:center;justify-content:center;font-size:2.6rem;position:relative;overflow:hidden}
.dl-thumb img{width:100%;height:100%;object-fit:cover;position:absolute;inset:0}
.thumb-emoji{position:relative;z-index:1}
.dl-badges{position:absolute;top:8px;right:8px;display:flex;flex-direction:column;align-items:flex-end;gap:4px;z-index:2}
.dl-badge{font-size:.64rem;font-weight:600;letter-spacing:.8px;text-transform:uppercase;padding:3px 9px;border-radius:99px}
.dl-engine-tag{position:absolute;bottom:7px;left:9px;font-size:.62rem;font-weight:600;letter-spacing:.6px;text-transform:uppercase;background:rgba(0,0,0,.55);backdrop-filter:blur(6px);color:var(--muted);padding:3px 8px;border-radius:6px;border:1px solid var(--border);z-index:2}
.dl-body{padding:14px 16px}
.dl-cat{font-size:.67rem;color:var(--accent2);letter-spacing:1px;text-transform:uppercase;font-weight:600;margin-bottom:5px}
.dl-body h3{font-family:'Syne',sans-serif;font-size:.96rem;font-weight:700;margin-bottom:5px}
.dl-body p{font-size:.82rem;color:var(--muted);line-height:1.6;margin-bottom:12px}
.dl-meta{display:flex;align-items:center;justify-content:space-between;gap:8px}
.dl-size{font-size:.73rem;color:var(--muted)}
.dl-btn{display:inline-flex;align-items:center;gap:5px;background:linear-gradient(135deg,var(--accent2),var(--accent));color:#0a0d14;font-size:.78rem;font-weight:700;padding:8px 14px;border-radius:7px;text-decoration:none;transition:all .2s;border:none;cursor:pointer;white-space:nowrap}
.dl-btn:hover{transform:scale(1.05);box-shadow:0 0 16px rgba(0,229,255,.28)}
/* Versões */
.dl-versions{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px}
.dl-btn-ver{display:inline-flex;align-items:center;gap:5px;background:linear-gradient(135deg,var(--accent2),var(--accent));color:#0a0d14;font-size:.78rem;font-weight:700;padding:8px 14px;border-radius:7px;text-decoration:none;transition:all .2s;border:none;cursor:pointer;white-space:nowrap}
.dl-btn-ver:hover{transform:scale(1.05);box-shadow:0 0 16px rgba(0,229,255,.28)}
.dl-credit{display:flex;align-items:center;gap:5px;margin-top:8px;font-size:.69rem;color:var(--muted)}
.dl-credit span{color:var(--accent);font-weight:600}

.no-results{display:none;text-align:center;padding:56px 20px;color:var(--muted)}
.no-results.show{display:block}
.no-results h3{font-family:'Syne',sans-serif;font-size:1.35rem;font-weight:700;margin-bottom:8px;color:var(--text)}
.loading{text-align:center;padding:110px 20px;color:var(--muted)}
.loading h2{font-family:'Syne',sans-serif;font-size:1.4rem;margin-bottom:10px;color:var(--text)}
footer{border-top:1px solid var(--border);padding:28px 0;text-align:center;color:var(--muted);font-size:.8rem}
footer strong{color:var(--text)}

/* RESPONSIVE */
@media(max-width:700px){
  .nav-row1{padding:0 12px;height:52px;gap:8px}
  .logo{font-size:1.15rem}
  .btn-translate{padding:6px 10px;font-size:.74rem}
  .hero{padding:56px 0 36px}
  .hero h1{letter-spacing:-1px}
  .discord-banner{padding:24px 18px;gap:18px}
  .yt-banner{padding:20px 18px}
  .stats{gap:2px}
  .stat-card{min-width:calc(50% - 2px);flex:none;width:calc(50% - 1px)}
  .stat-card:first-child{border-radius:14px 4px 4px 4px}
  .stat-card:nth-child(2){border-radius:4px 14px 4px 4px}
  .stat-card:nth-child(3){border-radius:4px 4px 4px 14px}
  .stat-card:last-child{border-radius:4px 4px 14px 4px}
  .downloads-grid{grid-template-columns:1fr 1fr}
  .features-grid{grid-template-columns:1fr 1fr}
}
@media(max-width:500px){
  .wrapper{padding:0 12px}
  .logo{font-size:1rem}
  .btn-translate span{display:none}
  .hero{padding:42px 0 30px}
  .hero h1{font-size:1.95rem;letter-spacing:-.5px}
  .hero p{font-size:.92rem}
  .hero-actions{flex-direction:column;align-items:stretch}
  .hero-actions .btn{justify-content:center;width:100%}
  .creator-band{padding:14px}
  .creator-avatar{width:42px;height:42px;font-size:1.2rem}
  .creator-desc{font-size:.8rem}
  .stats{display:grid;grid-template-columns:1fr 1fr;gap:4px}
  .stat-card{border-radius:10px !important;min-width:0;width:100%}
  .stat-num{font-size:1.5rem}
  .features-grid{grid-template-columns:1fr}
  .section-title{font-size:1.3rem}
  .discord-banner{padding:18px 14px;gap:14px}
  .discord-content h2{font-size:1.2rem}
  .discord-content p{font-size:.81rem}
  .perk{font-size:.73rem;padding:4px 9px}
  .btn-discord{font-size:.83rem;padding:10px 16px}
  .yt-banner{padding:14px;gap:12px}
  .btn-yt{width:100%;justify-content:center}
  .dl-page-hero{padding:36px 0 24px}
  .dl-page-hero h1{font-size:1.7rem;letter-spacing:-.5px}
  .downloads-grid{grid-template-columns:1fr}
  .game-header-info h2{font-size:1.1rem}
  .dl-btn,.dl-btn-ver{padding:7px 12px;font-size:.75rem}
  footer{padding:20px 0}
}
@media(max-width:360px){
  .logo{font-size:.9rem}
  .hero h1{font-size:1.7rem}
}

/* ── MODAL DE MISSÕES ── */
.mission-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);backdrop-filter:blur(8px);z-index:1000;display:flex;align-items:center;justify-content:center;padding:16px;opacity:0;pointer-events:none;transition:opacity .25s}
.mission-overlay.show{opacity:1;pointer-events:all}
.mission-box{background:var(--surface);border:1px solid var(--border);border-radius:20px;width:100%;max-width:440px;overflow:hidden;transform:translateY(20px);transition:transform .25s;box-shadow:0 0 60px rgba(0,0,0,.6)}
.mission-overlay.show .mission-box{transform:translateY(0)}
.mission-header{padding:22px 24px 16px;border-bottom:1px solid var(--border);display:flex;align-items:flex-start;justify-content:space-between;gap:12px}
.mission-header-info h2{font-family:'Syne',sans-serif;font-size:1.05rem;font-weight:800;margin-bottom:4px}
.mission-header-info p{font-size:.78rem;color:var(--muted);line-height:1.5}
.mission-close{background:none;border:none;color:var(--muted);cursor:pointer;font-size:1.2rem;padding:2px;line-height:1;flex-shrink:0;transition:color .2s}
.mission-close:hover{color:var(--text)}
.mission-tasks{padding:16px 24px;display:flex;flex-direction:column;gap:10px}
.mission-task{display:flex;align-items:center;gap:12px;background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:12px 14px;transition:all .2s}
.mission-task.done{border-color:rgba(0,229,255,.3);background:rgba(0,229,255,.05)}

.mission-task.done .mission-task-check{background:var(--accent);border-color:var(--accent);color:#0a0d14;font-weight:900}

const SVG_YT  = `<svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor"><path d="M23.498 6.186a3.016 3.016 0 0 0-2.122-2.136C19.505 3.545 12 3.545 12 3.545s-7.505 0-9.377.505A3.017 3.017 0 0 0 .502 6.186C0 8.07 0 12 0 12s0 3.93.502 5.814a3.016 3.016 0 0 0 2.122 2.136c1.871.505 9.376.505 9.376.505s7.505 0 9.377-.505a3.015 3.015 0 0 0 2.122-2.136C24 15.93 24 12 24 12s0-3.93-.502-5.814zM9.545 15.568V8.432L15.818 12l-6.273 3.568z"/></svg>`;

// ── CONFIG PARSER ──
async function loadConfig(){
  try{ const r=await fetch('config.txt?t='+Date.now()); if(!r.ok)throw 0; return r.text(); }
  catch(e){ return null; }
}
function parseConfig(raw){
  const cfg={site:{},badges:{},paginas:{},categorias:{},itens:{},abas:{},missoes:{}};
  let section=null,sType=null,sKey=null;
  for(let line of raw.split('\n')){
    line=line.trim();
    if(!line||line.startsWith('#')) continue;
    const sec=line.match(/^\[([^\]]+)\]$/);
    if(sec){
      const p=sec[1].split(':');
      sType=p[0];
      if(sType==='site'){section=cfg.site;}
      else if(sType==='badge'){sKey=p[1];cfg.badges[sKey]={};section=cfg.badges[sKey];}
      else if(sType==='pagina'){sKey=p[1];cfg.paginas[sKey]={};section=cfg.paginas[sKey];}
      else if(sType==='categoria'){
        const pg=p[1],cat=p[2];
        if(!cfg.categorias[pg])cfg.categorias[pg]={};
        cfg.categorias[pg][cat]={};section=cfg.categorias[pg][cat];
      }
      else if(sType==='item'){sKey=p[1];cfg.itens[sKey]={};section=cfg.itens[sKey];}
      else if(sType==='aba'){sKey=p[1];cfg.abas[sKey]={blocos:[]};section=cfg.abas[sKey];}
      else if(sType==='bloco'){const abaKey=p[1];if(!cfg.abas[abaKey])cfg.abas[abaKey]={blocos:[]};const blk={};cfg.abas[abaKey].blocos.push(blk);section=blk;}
      else if(sType==='missao'){sKey=p.slice(1).join(':');cfg.missoes[sKey]={tarefas:[]};section=cfg.missoes[sKey];}
      else if(sType==='tarefa'){const mk=p.slice(1).join(':');if(!cfg.missoes[mk])cfg.missoes[mk]={tarefas:[]};const t={};cfg.missoes[mk].tarefas.push(t);section=t;}
      else section=null;
      continue;
    }
    const kv=line.match(/^([^=]+)=(.*)$/);
    if(kv&&section) section[kv[1].trim()]=kv[2].trim();
  }
  return cfg;
}

// ── BADGE ──
function hexToRgba(hex,a){
  hex=hex.replace('#','');
  if(hex.length===3)hex=hex.split('').map(c=>c+c).join('');
  return `rgba(${parseInt(hex.slice(0,2),16)},${parseInt(hex.slice(2,4),16)},${parseInt(hex.slice(4,6),16)},${a})`;
}
function badgeStyle(b){
  const c=b.cor_texto||'#fff';
  let style=`color:${c};background:${hexToRgba(b.cor_fundo||c,.12)};border:1px solid ${hexToRgba(b.cor_borda||c,.3)}`;
  if(b.cor_contorno){
    const o=b.cor_contorno;
    style+=`;-webkit-text-stroke:1.5px ${o};paint-order:stroke fill`;
  }
  return style;
}
function isUrl(s){ return s&&(s.startsWith('http')||s.startsWith('/')||/\.(png|jpg|gif|webp|svg)/.test(s)); }

        <div class="discord-content">

          <p>${cf(s,'discord_descricao')}</p>

      </div>
      <div class="yt-banner">
        ${SVG_YT.replace('width="15" height="15"','width="48" height="48"').replace('fill="currentColor"','fill="#ff0000" style="flex-shrink:0"')}
        <div class="yt-content">
          <h3>${cf(s,'youtube_texto')}</h3>
          <p>${cf(s,'youtube_descricao')}</p>
        </div>
        <a href="${s.youtube_url||'#'}" target="_blank" class="btn-yt">${SVG_YT.replace('15','14').replace('15','14')} ${currentLang==='en'?'Subscribe on YouTube':'Inscrever no YouTube'}</a>
      </div>
    </section>
  </div></div>`;

// ── BUILD DOWNLOADS ──
function buildDownloads(cfg, abaKey){
  abaKey = abaKey||'downloads';
  // Get all downloads aba keys in order (to know which is "first" for backwards compat)
  const allDlAbas=Object.entries(cfg.abas).filter(([,a])=>a.tipo_fixo==='downloads').map(([k])=>k);
  const isFirstDlAba=allDlAbas[0]===abaKey;
  let sections='';
  for(const pgKey of Object.keys(cfg.paginas)){
    const pg=cfg.paginas[pgKey];
    // Show this pagina if: pg.aba === abaKey, OR pg.aba is empty and this is the first downloads aba
    const pgAba=pg.aba||'';
    if(pgAba && pgAba!==abaKey) continue;
    if(!pgAba && !isFirstDlAba) continue;
    const cats=cfg.categorias[pgKey]||{};
    const catKeys=Object.keys(cats);
    const pgItens=Object.entries(cfg.itens).filter(([,v])=>v.pagina===pgKey);
    const subTabsKey=`${abaKey}-${pgKey}`;
    const subTabs=catKeys.length?`
      <div class="sub-tabs" id="tabs-${subTabsKey}">
        <button class="sub-tab active" onclick="filterCat(this,'${subTabsKey}','all')">${currentLang==='en'?'All':'Todos'}</button>
        ${catKeys.map(ck=>`<button class="sub-tab" onclick="filterCat(this,'${subTabsKey}','${ck}')">${cf(cats[ck],'nome')||ck}</button>`).join('')}
      </div>`:'';
    const grad=pg.cor_icone?`background:linear-gradient(135deg,${pg.cor_icone})`:'background:var(--surface2)';
    const iconHtml=isUrl(pg.icone)?`<img src="${pg.icone}"/>`:(pg.icone||'📁');
    const itemLabel=currentLang==='en'?'item':'item';
    const itemsLabel=currentLang==='en'?'items':'itens';
    const secId=`section-${abaKey}-${pgKey}`;
    const gridId=`grid-${abaKey}-${pgKey}`;
    const tabsId=`tabs-${abaKey}-${pgKey}`;
    const countId=`count-${abaKey}-${pgKey}`;
    sections+=`
    <div class="game-section" id="${secId}">
      <div class="game-header">
        <div class="game-icon" style="${grad}">${iconHtml}</div>
        <div class="game-header-info">
          <h2>${cf(pg,'nome')||pgKey}</h2>
          <p>${cf(pg,'descricao')}</p>
        </div>
        <span class="game-count" id="${countId}">${pgItens.length} ${pgItens.length===1?itemLabel:itemsLabel}</span>
      </div>
      ${subTabs.replace(/id="tabs-\${pgKey}"/,`id="${tabsId}"`).replace(/filterCat\(this,'\${pgKey}'/g,`filterCat(this,'${abaKey}-${pgKey}'`)}
      <div class="downloads-grid" id="${gridId}">
        ${pgItens.map(([k,v])=>buildCard(k,v,pgKey,cats,cfg.badges,cfg)).join('')}
      </div>
    </div>`;
  }
  return `<div id="page-downloads" class="page"><div class="wrapper">
    <section class="dl-page-hero">
      <div class="hero-tag">Netuke.Workshop</div>
      <h1>${currentLang==='en'?'All':'Todos os'} <em>Downloads</em></h1>
      <p>${currentLang==='en'?'Content created and verified by Netuke, available for free to the community.':`Conteúdos criados e verificados pelo Netuke, disponíveis de graça para a comunidade.`}</p>
    </section>
    <div class="search-info" id="search-info-${abaKey}" style="display:none;text-align:center;margin-bottom:28px;color:var(--muted);font-size:.88rem">
      ${currentLang==='en'?'Results for:':`Resultados para:`} <strong id="search-term-${abaKey}"></strong>
      <button class="clear-btn" onclick="clearSearch('${abaKey}')">✕ ${currentLang==='en'?'Clear':'Limpar'}</button>
    </div>
    <div class="no-results" id="no-results-${abaKey}">
      <h3>${currentLang==='en'?'No results 😕':'Nenhum resultado 😕'}</h3>
      <p>${currentLang==='en'?'Try searching for another term.':'Tente buscar por outro termo.'}</p>
    </div>
    ${sections}
    <div style="text-align:center;padding:28px 0 66px">
      <p style="color:var(--muted);margin-bottom:12px;font-size:.87rem">${currentLang==='en'?'Want news before everyone? Join the Discord!':'Quer novidades antes de todo mundo? Entre no Discord!'}</p>
      <a href="${cfg.site.discord_url||'#'}" target="_blank" class="btn-discord">${SVG_DC(15)} ${currentLang==='en'?'Join the Server':'Entrar no Servidor'}</a>
    </div>
  </div></div>`;
}

// ── BUILD CARD ──
function buildCard(key,item,pgKey,cats,badges,cfg){
  cfg=cfg||_cfg||{};
  // Badges — múltiplos separados por | (ex: badge = novo | beta | exclusivo)
  let badgeHtml='';
  if(item.badge){
    const badgeList=item.badge.split('|').map(b=>b.trim()).filter(Boolean);
    const spans=badgeList.map(bKey=>{
      const b=badges[bKey];
      if(!b) return '';
      const bTexto=cf(b,'texto')||bKey;
      return `<span class="dl-badge" style="${badgeStyle(b)}">${bTexto}</span>`;
    }).join('');
    if(spans) badgeHtml=`<div class="dl-badges">${spans}</div>`;
  }
  // Engine tag — usa nome_en se EN
  let engTag='';
  if(item.categoria&&cats[item.categoria])
    engTag=`<span class="dl-engine-tag">${cf(cats[item.categoria],'nome')||item.categoria}</span>`;
  // Thumb
  const tStyle=item.cor_fundo?`background:linear-gradient(135deg,${item.cor_fundo})`:'background:var(--surface2)';
  const tContent=isUrl(item.icone)
    ?`<img src="${item.icone}" alt="" style="width:100%;height:100%;object-fit:cover;position:absolute;inset:0"/>`
    :`<span class="thumb-emoji">${item.icone||'📁'}</span>`;
  // Cat label — usa nome_en se EN
  const catLabel=item.categoria&&cats[item.categoria]
    ?`${pgKey.toUpperCase()} · ${cf(cats[item.categoria],'nome')||item.categoria}`
    :pgKey.toUpperCase();
  // Criador
  // criador_icone: emoji, URL de imagem, ou 'yt' (padrão), 'dc', 'nenhum'
  let criadorIconHtml='';
  if(item.criador){
    const ci=item.criador_icone||'yt';
    if(ci==='yt')
      criadorIconHtml=SVG_YT.replace('width="15" height="15"','width="10" height="10"').replace('fill="currentColor"','fill="#ff4444"');
    else if(ci==='dc')
      criadorIconHtml=SVG_DC(10);
    else if(ci==='nenhum'||ci==='none')
      criadorIconHtml='';
    else if(isUrl(ci))
      criadorIconHtml=`<img src="${ci}" style="width:10px;height:10px;border-radius:50%;object-fit:cover;flex-shrink:0"/>`;
    else
      criadorIconHtml=`<span style="font-size:10px;line-height:1">${ci}</span>`;
  }
  const criadorHtml=item.criador
    ?`<div class="dl-credit">${criadorIconHtml} ${currentLang==='en'?'Made by':'Feito por'} <span>${item.criador}</span></div>`
    :'';

  // ── VERSÕES — separador >> ──
  let downloadHtml='';
  if(item.versoes){
    const vers=item.versoes.split('|').map(v=>v.trim()).filter(Boolean);
    const btns=vers.map(v=>{
      const sepIdx=v.indexOf('>>');
      let label,href;
      if(sepIdx>0){ label=v.slice(0,sepIdx).trim(); href=v.slice(sepIdx+2).trim()||'#'; }
      else { label=v; href='#'; }
      const target=href!=='#'?' target="_blank"':'';
      // Busca missão por "item:versao" primeiro, depois "item" como fallback
      const missaoKeyVer=`${key}:${label}`;
      const hasMissaoVer=_cfg&&_cfg.missoes&&(_cfg.missoes[missaoKeyVer]||_cfg.missoes[key]);
      const verMissaoKey=(_cfg&&_cfg.missoes&&_cfg.missoes[missaoKeyVer])?missaoKeyVer:key;
      const verClick=hasMissaoVer
        ? `onclick="event.preventDefault();openMission('${verMissaoKey}','${href}','${label}',_cfg)"`
        : target;
      return `<a href="${href}" ${verClick} class="dl-btn-ver">⬇ ${label}</a>`;
    }).join('');
    downloadHtml=`<div class="dl-versions">${btns}</div>`;
  } else {
    const href=item.link||'#';
    const missaoKeySingle=key;
    const hasMissao=_cfg&&_cfg.missoes&&_cfg.missoes[missaoKeySingle];
    const dlClick=hasMissao
      ? `onclick="event.preventDefault();openMission('${missaoKeySingle}','${href}','${cf(item,'titulo')||key}',_cfg)"`
      : (href!=='#'?'target="_blank"':'');
    downloadHtml=`<div class="dl-meta"><span class="dl-size">${cf(item,'tamanho')?'📦 '+cf(item,'tamanho'):''}</span><a href="${href}" ${dlClick} class="dl-btn">⬇ ${currentLang==='en'?'Download':'Baixar'}</a></div>`;
  }
  const tamanhoLabel=cf(item,'tamanho');
  const sizeUnderVersions=item.versoes&&tamanhoLabel?`<div class="dl-size" style="margin-top:6px">📦 ${tamanhoLabel}</div>`:'';

  return `<div class="dl-card" data-page="${pgKey}" data-cat="${item.categoria||''}" data-search="${(item.titulo+' '+item.descricao+' '+pgKey+' '+(item.categoria||'')).toLowerCase()}">
    <div class="dl-thumb" style="${tStyle}">${tContent}${badgeHtml}${engTag}</div>
    <div class="dl-body">
      <div class="dl-cat">${catLabel}</div>
      <h3>${cf(item,'titulo')||item.titulo||'Item'}</h3>
      <p>${cf(item,'descricao')||item.descricao||''}</p>
      ${downloadHtml}
      ${sizeUnderVersions}
      ${criadorHtml}
    </div>
  </div>`;
}

// ── BUILD ABA CUSTOMIZADA ──
function buildAba(abaKey, aba){
  const blocos = (aba.blocos||[]).map(b=>{
    const tipo = b.tipo||'texto';
    const grad = b.cor_fundo ? `background:linear-gradient(135deg,${b.cor_fundo})` : 'background:var(--surface)';

    if(tipo==='hero'){
      const titulo = cf(b,'titulo')||'';
      const sub = cf(b,'subtitulo')||'';
      const desc = cf(b,'descricao')||'';
      const btnTxt = cf(b,'botao_texto')||'';
      const btnLink = b.botao_link||'#';
      const imgHtml = b.imagem ? `<img src="${b.imagem}" style="max-width:100%;border-radius:14px;margin-top:24px;border:1px solid var(--border)"/>` : '';
      return `<section style="padding:70px 0 50px;text-align:center">
        <div class="hero-tag">${cf(aba,'nome')||abaKey}</div>
        <h1 style="font-family:'Syne',sans-serif;font-size:clamp(2rem,5vw,3.5rem);font-weight:800;letter-spacing:-2px;margin:16px 0;line-height:1.1">${titulo}</h1>
        ${sub?`<p style="font-size:1.1rem;color:var(--accent2);font-weight:600;margin-bottom:12px">${sub}</p>`:''}
        ${desc?`<p style="color:var(--muted);font-size:1rem;max-width:560px;margin:0 auto 28px;line-height:1.8">${desc}</p>`:''}
        ${btnTxt?`<a href="${btnLink}" ${btnLink!=='#'?'target="_blank"':''} class="btn btn-primary">${btnTxt}</a>`:''}
        ${imgHtml}
      </section>`;
    }

    if(tipo==='cards'){
      const itens = (cf(b,'itens')||'').split('|').map(i=>i.trim()).filter(Boolean);
      const cardsHtml = itens.map(i=>{
        const p = i.split('::');
        const tit = p[0]||''; const desc = p[1]||''; const ico = p[2]||'📄';
        return `<div class="feat-card"><div class="feat-icon">${ico}</div><h3>${tit}</h3><p>${desc}</p></div>`;
      }).join('');
      return `<section style="padding:40px 0">
        ${cf(b,'titulo')?`<div class="section-title" style="margin-bottom:8px">${cf(b,'titulo')}</div>`:''}
        ${cf(b,'subtitulo')?`<p class="section-sub">${cf(b,'subtitulo')}</p>`:''}
        <div class="features-grid">${cardsHtml}</div>
      </section>`;
    }

    if(tipo==='banner'){
      const titulo = cf(b,'titulo')||'';
      const desc = cf(b,'descricao')||'';
      const btnTxt = cf(b,'botao_texto')||'';
      const btnLink = b.botao_link||'#';
      const imgHtml = b.imagem ? `<img src="${b.imagem}" style="width:80px;height:80px;object-fit:cover;border-radius:16px;flex-shrink:0"/>` : `<div style="font-size:3rem;flex-shrink:0">${b.icone||'📌'}</div>`;
      return `<div style="${grad};border:1px solid var(--border);border-radius:18px;padding:32px 28px;display:flex;align-items:center;gap:22px;flex-wrap:wrap;margin:20px 0">
        ${imgHtml}
        <div style="flex:1;min-width:0">
          ${titulo?`<h2 style="font-family:'Syne',sans-serif;font-size:1.4rem;font-weight:800;margin-bottom:8px">${titulo}</h2>`:''}
          ${desc?`<p style="color:var(--muted);line-height:1.7;margin-bottom:${btnTxt?'16px':'0'}">${desc}</p>`:''}
          ${btnTxt?`<a href="${btnLink}" ${btnLink!=='#'?'target="_blank"':''} class="btn btn-primary">${btnTxt}</a>`:''}
        </div>
      </div>`;
    }

    if(tipo==='texto'){
      const titulo = cf(b,'titulo')||'';
      const desc = cf(b,'descricao')||'';
      return `<section style="padding:32px 0">
        ${titulo?`<div class="section-title" style="margin-bottom:10px">${titulo}</div>`:''}
        ${desc?`<p style="color:var(--muted);line-height:1.8;font-size:1rem;max-width:720px">${desc}</p>`:''}
      </section>`;
    }

    if(tipo==='divider'){
      return `<hr class="divider" style="margin:8px 0"/>`;
    }

    return '';
  }).join('');

  return `<div id="page-aba-${abaKey}" class="page"><div class="wrapper" style="padding-bottom:80px">${blocos}</div></div>`;
}

function buildFooter(cfg){
  const s=cfg.site;
  return `<footer><div class="wrapper">
    <p><strong>${cf(s,'rodape')}</strong></p>
    <small style="color:#3d4a60">${cf(s,'rodape_sub')}</small>
  </div></footer>`;
}

// ── LANGUAGE ──
let currentLang='pt';
function t(ptVal, enVal){ return currentLang==='en' ? (enVal||ptVal) : ptVal; }
function toggleLang(){
  currentLang=currentLang==='pt'?'en':'pt';
  if(_cfg){
    // Re-render all pages with new language
    document.getElementById('app').innerHTML=buildAllPages(_cfg)+buildFooter(_cfg);
    // Re-bind downloads page id
    const dlKey=Object.entries(_cfg.abas).find(([,a])=>a.tipo_fixo==='downloads')?.[0];
      setupMusicObservers(_cfg);
  }
  applyLangUI();
}
function applyLangUI(){
  // Update translate button
  const btn=document.getElementById('btn-translate');
  if(btn){
    btn.classList.toggle('active',currentLang==='en');
    btn.querySelector('span').textContent=currentLang==='pt'?'English':'Português';
  }
  const si=document.getElementById('search-input');
  if(si) si.placeholder=currentLang==='en'?'Search downloads...':'Buscar downloads...';
  document.documentElement.lang=currentLang==='en'?'en':'pt-BR';
  // Rebuild nav tabs with new language
  if(_cfg) buildNavTabs(_cfg);
  // Restore active page
  const activePage=_activePage||('aba-'+(Object.keys(_cfg?.abas||{})[0]||''));
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  if(activePage){
    document.getElementById('page-'+activePage)?.classList.add('active');
    // tab id is always 'tab-aba-KEY'
    const abaKey=activePage.startsWith('aba-')?activePage.slice(4):activePage;
    document.getElementById('tab-aba-'+abaKey)?.classList.add('active');
  }
}
// Helper: get field with optional _en translation
function cf(obj, key){ 
  if(currentLang==='en' && obj[key+'_en']) return obj[key+'_en'];
  return obj[key]||'';
}

// ── MUSIC ──
let currentMusic=null,musicPlaying=false;
const audio=document.getElementById('bg-audio');
function loadMusic(src,name){
  if(!src){document.getElementById('music-bar').classList.remove('show');audio.pause();return;}
  audio.src=src;
  document.getElementById('music-name').textContent=name||src;
  document.getElementById('music-bar').classList.add('show');
  document.getElementById('music-toggle').textContent='▶ Play';
  musicPlaying=false;
}
function toggleMusic(){
  if(musicPlaying){audio.pause();document.getElementById('music-toggle').textContent='▶ Play';musicPlaying=false;}
  else{audio.play().catch(()=>{});document.getElementById('music-toggle').textContent='⏸ Pausar';musicPlaying=true;}
}
function stopMusic(){audio.pause();audio.currentTime=0;document.getElementById('music-toggle').textContent='▶ Play';musicPlaying=false;}

// ── PAGE / FILTER ──
let _cfg=null;
function goHome(){
  if(!_cfg) return;
  const homeEntry=Object.entries(_cfg.abas).find(([,a])=>a.tipo_fixo==='home');
  const key=homeEntry?homeEntry[0]:Object.keys(_cfg.abas)[0];
  if(key) showPage('aba-'+key);
}
function goDownloads(){
  if(!_cfg) return;
  const dlEntry=Object.entries(_cfg.abas).find(([,a])=>a.tipo_fixo==='downloads');
  const key=dlEntry?dlEntry[0]:null;
  if(key) showPage('aba-'+key);
}
let _activePage='';
function showPage(name){
  _activePage=name;
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('page-'+name)?.classList.add('active');
  document.getElementById('tab-'+name)?.classList.add('active');
  window.scrollTo({top:0,behavior:'smooth'});
  // Check if this is a downloads aba
  const abaKey=name.startsWith('aba-')?name.slice(4):name;
  const isDownloads=_cfg&&_cfg.abas[abaKey]?.tipo_fixo==='downloads';
  if(isDownloads){
    resetSearch(abaKey);
  } else {
    stopMusic();
    document.getElementById('music-bar').classList.remove('show');
    currentMusic=null;
  }
}
function filterCat(btn,tabsKey,cat){
  // tabsKey is 'abaKey-pgKey' e.g. 'downloads-brawlstars'
  document.querySelectorAll('#tabs-'+tabsKey+' .sub-tab').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  const grid=document.getElementById('grid-'+tabsKey);
  if(!grid) return;
  let vis=0;
  grid.querySelectorAll('.dl-card').forEach(c=>{
    const show=cat==='all'||c.dataset.cat===cat;
    c.classList.toggle('hidden',!show);
    if(show) vis++;
  });
  const el=document.getElementById('count-'+tabsKey);
  if(el) el.textContent=vis+(vis===1?' item':' itens');
}
// Get the active downloads aba key
function getActiveDlAbaKey(){
  if(!_cfg) return null;
  // Find which downloads aba is currently active, or first one
  const dlAbas=Object.entries(_cfg.abas).filter(([,a])=>a.tipo_fixo==='downloads');
  const active=dlAbas.find(([k])=>document.getElementById('page-aba-'+k)?.classList.contains('active'));
  return (active||dlAbas[0]||[])[0]||null;
}
function handleSearch(val){
  const q=val.trim().toLowerCase();
  const abaKey=getActiveDlAbaKey();
  if(!q){resetSearch(abaKey);return;}
  if(!abaKey) return;
  const dlPgId='page-aba-'+abaKey;
  if(!document.getElementById(dlPgId)?.classList.contains('active')){
    document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
    document.getElementById(dlPgId)?.classList.add('active');
    document.getElementById('tab-aba-'+abaKey)?.classList.add('active');
    _activePage='aba-'+abaKey;
  }
  let found=0;
  document.querySelectorAll('#'+dlPgId+' .dl-card').forEach(c=>{
    const m=(c.dataset.search||'').includes(q)||(c.querySelector('h3')||{}).textContent?.toLowerCase().includes(q);
    c.classList.toggle('hidden',!m);
    if(m) found++;
  });
  document.querySelectorAll('#'+dlPgId+' .game-section').forEach(s=>{
    s.style.display=s.querySelectorAll('.dl-card:not(.hidden)').length>0?'':'none';
  });
  const si=document.getElementById('search-info-'+abaKey);
  const st=document.getElementById('search-term-'+abaKey);
  if(si) si.style.display='block';
  if(st) st.textContent=val.trim();
  document.getElementById('no-results-'+abaKey)?.classList.toggle('show',found===0);
}
function clearSearch(abaKey){
  document.getElementById('search-input').value='';
  resetSearch(abaKey||getActiveDlAbaKey());
}
function resetSearch(abaKey){
  if(!abaKey) abaKey=getActiveDlAbaKey();
  if(!abaKey) return;
  const pgId='page-aba-'+abaKey;
  document.querySelectorAll('#'+pgId+' .dl-card').forEach(c=>c.classList.remove('hidden'));
  document.querySelectorAll('#'+pgId+' .game-section').forEach(s=>s.style.display='');
  const si=document.getElementById('search-info-'+abaKey);
  if(si) si.style.display='none';
  document.getElementById('no-results-'+abaKey)?.classList.remove('show');
  if(_cfg) Object.keys(_cfg.paginas).forEach(pk=>{
    const tabsKey=abaKey+'-'+pk;
    const t=document.querySelector('#tabs-'+tabsKey+' .sub-tab');
    if(t) filterCat(t,tabsKey,'all');
  });
}
document.getElementById('search-input').addEventListener('keydown',e=>{if(e.key==='Enter')handleSearch(e.target.value);});

// SVGs for built-in page types
const SVG_HOME = `<svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>`;
const SVG_DL   = `<svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/></svg>`;

function buildNavTabs(cfg){
  const tabNav=document.getElementById('tab-nav');
  tabNav.innerHTML='';
  let first=true;
  for(const [abaKey,aba] of Object.entries(cfg.abas)){
    const tipo=aba.tipo_fixo||''; // 'home' | 'downloads' | '' (custom)
    const icone=aba.icone||'📄';
    const nome=cf(aba,'nome')||abaKey;
    const btn=document.createElement('button');
    btn.className='tab-btn'+(first?' active':'');
    btn.id='tab-aba-'+abaKey;
    let iconHtml='';
    if(tipo==='home') iconHtml=SVG_HOME;
    else if(tipo==='downloads') iconHtml=SVG_DL;
    else if(isUrl(icone)) iconHtml=`<img src="${icone}" style="width:14px;height:14px;border-radius:3px;object-fit:cover"/>`;
    else iconHtml=`<span style="font-size:13px">${icone}</span>`;
    btn.innerHTML=iconHtml+' '+nome;
    btn.onclick=()=>showPage('aba-'+abaKey);
    tabNav.appendChild(btn);
    if(first){ _activePage='aba-'+abaKey; first=false; }
  }
}

function buildAllPages(cfg){
  let html='';
  let first=true;
  for(const [abaKey,aba] of Object.entries(cfg.abas)){
    const tipo=aba.tipo_fixo||'';
    let pageHtml='';
    if(tipo==='home') pageHtml=buildHome(cfg).replace('id="page-home"',`id="page-aba-${abaKey}"`);
    else if(tipo==='downloads') pageHtml=buildDownloads(cfg,abaKey).replace('id="page-downloads"',`id="page-aba-${abaKey}"`);
    else pageHtml=buildAba(abaKey,aba);
    // First page is active
    if(first){ pageHtml=pageHtml.replace('class="page"','class="page active"'); first=false; }
    html+=pageHtml;
  }
  return html;
}

function setupMusicObservers(cfg){
  // Get ALL downloads aba keys
  const dlKeys=Object.entries(cfg.abas).filter(([,a])=>a.tipo_fixo==='downloads').map(([k])=>k);
  if(!dlKeys.length) return;
  // For each downloads aba, for each pagina with musica, observe its section
  const allDlAbas=dlKeys;
  dlKeys.forEach(dlKey=>{
    const dlPageId='page-aba-'+dlKey;
    const isFirstDlAba=allDlAbas[0]===dlKey;
    Object.entries(cfg.paginas).forEach(([pk,pg])=>{
      if(!pg.musica) return;
      // Only observe if this pagina belongs to this aba
      const pgAba=pg.aba||'';
      if(pgAba && pgAba!==dlKey) return;
      if(!pgAba && !isFirstDlAba) return;
      const secId='section-'+dlKey+'-'+pk;
      const sec=document.getElementById(secId);
      if(!sec) return;
      new IntersectionObserver(entries=>entries.forEach(e=>{
        if(e.isIntersecting&&document.getElementById(dlPageId)?.classList.contains('active')){
          const musicSrc=pg.musica;
          if(currentMusic===musicSrc) return;
          currentMusic=musicSrc;
          loadMusic(musicSrc, cf(pg,'nome')||pg.nome||pk);
          audio.play().then(()=>{musicPlaying=true;document.getElementById('music-toggle').textContent='⏸ Pausar';}).catch(()=>{});
        }
      }),{threshold:0.3}).observe(sec);
    });
  });
}


// ── SISTEMA DE MISSÕES ──
let _missionState = {}; // { taskKey: true/false }
let _missionTarget = null; // { href, label }

function openMission(itemKey, href, label, cfg){
  const missao = cfg.missoes && cfg.missoes[itemKey];
  if(!missao) { window.open(href,'_blank'); return; }

  _missionTarget = { href, label };
  _missionState = {};

  // Título e descrição do modal
  const titulo = cf(missao,'titulo') || (currentLang==='en'?'Unlock Download':'Desbloquear Download');
  const desc   = cf(missao,'descricao') || (currentLang==='en'?'Complete the tasks below to unlock the download.':'Complete as tarefas abaixo para liberar o download.');
  document.getElementById('mission-title').textContent = '🔒 ' + titulo;
  document.getElementById('mission-desc').textContent  = desc;
  document.getElementById('mission-dl-label').textContent = currentLang==='en'?'Download':'Baixar';

  // Tarefas
  const tarefas = missao.tarefas || [];
  const container = document.getElementById('mission-tasks');
  container.innerHTML = '';

  tarefas.forEach((t, i) => {
    const key = 'task_' + i;
    _missionState[key] = false;
    const nome  = cf(t,'nome')  || t.nome  || '';
    const dica  = cf(t,'dica')  || t.dica  || '';
    const link  = t.link  || '#';
    const icone = t.icone || '✅';
    const btnTxt = cf(t,'botao') || (currentLang==='en'?'Go':'Ir');

    const div = document.createElement('div');
    div.className = 'mission-task';
    div.id = 'mission-task-' + key;
    div.innerHTML = `
      <div class="mission-task-icon">${icone}</div>
      <div class="mission-task-info">
        <strong>${nome}</strong>
        ${dica ? `<span>${dica}</span>` : ''}
      </div>
      <a href="${link}" target="_blank" class="mission-task-btn" id="mission-btn-${key}"
         onclick="missionTaskClick('${key}', this)">${btnTxt} ↗</a>
      <div class="mission-task-check" id="mission-check-${key}"></div>
    `;
    container.appendChild(div);
  });

  updateMissionProgress();
  document.getElementById('mission-overlay').classList.add('show');
  document.body.style.overflow = 'hidden';
}

function missionTaskClick(key, btn){
  // Mark as done after a short delay (user opened the link)
  setTimeout(() => {
    _missionState[key] = true;
    const task  = document.getElementById('mission-task-' + key);
    const check = document.getElementById('mission-check-' + key);
    if(task)  task.classList.add('done');
    if(check) check.textContent = '✓';
    btn.textContent = currentLang==='en' ? 'Done ✓' : 'Feito ✓';
    btn.classList.add('done-btn');
    btn.onclick = null;
    updateMissionProgress();
  }, 1800);
}

function updateMissionProgress(){
  const total = Object.keys(_missionState).length;
  const done  = Object.values(_missionState).filter(Boolean).length;
  const dlBtn = document.getElementById('mission-dl-btn');
  const prog  = document.getElementById('mission-progress');

  if(total > 0){
    prog.innerHTML = currentLang==='en'
      ? `<span>${done}</span> of <span>${total}</span> tasks completed`
      : `<span>${done}</span> de <span>${total}</span> tarefas concluídas`;
  }

  if(done >= total && total > 0){
    dlBtn.href = _missionTarget.href;
    dlBtn.classList.add('unlocked');
    document.getElementById('mission-title').textContent = '🔓 ' + (currentLang==='en'?'Download Unlocked!':'Download Liberado!');
  } else {
    dlBtn.classList.remove('unlocked');
    dlBtn.href = '#';
  }
}

function closeMission(){
  document.getElementById('mission-overlay').classList.remove('show');
  document.body.style.overflow = '';
}
function missionOverlayClick(e){
  if(e.target === document.getElementById('mission-overlay')) closeMission();
}
document.addEventListener('keydown', e => { if(e.key==='Escape') closeMission(); });

// ── INIT ──
async function init(){
  const raw=await loadConfig();
  if(!raw){
    document.getElementById('app').innerHTML=`<div class="wrapper" style="padding:80px 0;text-align:center;color:var(--muted)"><h2 style="color:var(--text);font-family:'Syne',sans-serif;margin-bottom:12px">❌ config.txt não encontrado</h2><p>Coloque o <strong style="color:var(--accent)">config.txt</strong> na mesma pasta do index.html.</p></div>`;
    return;
  }
  const cfg=parseConfig(raw);
  _cfg=cfg;
  if(cfg.site.titulo) document.title=cfg.site.titulo;

  // Build nav tabs from config
  buildNavTabs(cfg);

  // Build all pages
  document.getElementById('app').innerHTML=buildAllPages(cfg)+buildFooter(cfg);

  setupMusicObservers(cfg);
}
init();
</script>
